<style>

font-family:Arial,sans-serif;
background:#111;

background:#1a1a1a;
padding:15px;

}

}

}

.next{

}

.prev{

}

.ad{

<option value="ai"> AI</option>
<option value="supercars"> Supercars</option>
</select>

<div class="info">
Wallpaper <span id="counter">1</span>/10
</div>

<img id="wallpaper" src="">

<div class="buttons">
<button class="prev" onclick="prevWallpaper()">⬅ Föregående</button>
<button class="next" onclick="nextWallpaper()">Nästa ➡</button>
</div>

<div class="buttons">
<button class="ad" onclick="show_11148451()"> Visa annons</button>
<a id="downloadLink" href="" download>

</a>
</div>

let currentCategory="gaming";
let currentIndex=0;

function updateWallpaper(){
const img=wallpapers[currentCategory][currentIndex];

document.getElementById("wallpaper").src=img;
document.getElementById("downloadLink").href=img;
document.getElementById("counter").innerText=currentIndex+1;
}

function nextWallpaper(){
currentIndex++;
if(currentIndex>=10){
currentIndex=0;
}
updateWallpaper();
}

function prevWallpaper(){
currentIndex--;
if(currentIndex<0){
currentIndex=9;
}
updateWallpaper();
}

function changeCategory(){
currentCategory=document.getElementById("category").value;
currentIndex=0;
updateWallpaper();
}

updateWallpaper();
