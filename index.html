<!DOCTYPE html> 
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wallpaper Hub</title>

<script src="//libtl.com/sdk.js"
data-zone="11148451"
data-sdk="show_11148451">
</script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
text-align:center;
}

header{
background:#1a1a1a;
padding:15px;
font-size:28px;
font-weight:bold;
}

select{
width:90%;
padding:12px;
margin:15px;
border-radius:10px;
font-size:16px;
}

img{
width:90%;
max-width:400px;
border-radius:15px;
margin-top:10px;
box-shadow:0 0 15px rgba(255,255,255,.2);
}

.buttons{
margin:20px;
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.next{
background:#2196f3;
color:white;
}

.prev{
background:#555;
color:white;
}

.ad{
background:#28a745;
color:white;
}

.download{
background:#ff9800;
color:white;
}

.info{
margin:15px;
font-size:18px;
}
</style>
</head>

<body>

<header> Wallpaper Hub</header>

<select id="category" onchange="changeCategory()">
<option value="gaming"> Gaming</option>
<option value="cars"> Cars</option>
<option value="nature"> Nature</option>
<option value="space"> Space</option>
<option value="ai"> AI</option>
<option value="supercars"> Supercars</option>
</select>

<div class="info">
Wallpaper <span id="counter">1</span>/<span id="total">0</span>
</div>

<img id="wallpaper" src="">

<div class="buttons">
<button class="prev" onclick="prevWallpaper()">⬅ Föregående</button>
<button class="next" onclick="nextWallpaper()">Nästa ➡</button>
</div>

<div class="buttons">
<button class="ad" onclick="show_11148451()"> Visa annons</button>
<a id="downloadLink" href="" download>
<button class="download">⬇ Ladda ner</button>
</a>
</div>

<script>

const wallpapers = {

gaming:[
"./wallpapers/gaminig/wallpaper_1_1.png",
"./wallpapers/gaminig/wallpaper_1_2.png",
"./wallpapers/gaminig/wallpaper_1_3.png",
"./wallpapers/gaminig/wallpaper_1_4.png",
"./wallpapers/gaminig/wallpaper_1_5.png",
"./wallpapers/gaminig/wallpaper_1_6.png"
],

cars:[
"./wallpapers/cars/wallpaper_2_1.png",
"./wallpapers/cars/wallpaper_2_2.png",
"./wallpapers/cars/wallpaper_2_3.png",
"./wallpapers/cars/wallpaper_2_4.png",
"./wallpapers/cars/wallpaper_2_5.png",
"./wallpapers/cars/wallpaper_2_6.png"
],

nature:[
"./wallpapers/nature/wallpaper_3_1.png",
"./wallpapers/nature/wallpaper_3_2.png",
"./wallpapers/nature/wallpaper_3_3.png",
"./wallpapers/nature/wallpaper_3_4.png",
"./wallpapers/nature/wallpaper_3_5.png",
"./wallpapers/nature/wallpaper_3_6.png"
],

space:[
"./wallpapers/space/wallpaper_4_1.png",
"./wallpapers/space/wallpaper_4_2.png",
"./wallpapers/space/wallpaper_4_3.png",
"./wallpapers/space/wallpaper_4_4.png",
"./wallpapers/space/wallpaper_4_5.png",
"./wallpapers/space/wallpaper_4_6.png"
],

ai:[
"./wallpapers/ai/wallpaper_5_1.png",
"./wallpapers/ai/wallpaper_5_2.png",
"./wallpapers/ai/wallpaper_5_3.png",
"./wallpapers/ai/wallpaper_5_4.png",
"./wallpapers/ai/wallpaper_5_5.png",
"./wallpapers/ai/wallpaper_5_6.png"
]

};

let currentCategory = "gaming";
let currentIndex = 0;

function updateWallpaper(){
const list = wallpapers[currentCategory];

document.getElementById("wallpaper").src =
list[currentIndex];

document.getElementById("downloadLink").href =
list[currentIndex];

document.getElementById("counter").innerText =
(currentIndex + 1) + "/" + list.length;
}

function nextWallpaper(){
currentIndex++;

if(currentIndex >= wallpapers[currentCategory].length){
currentIndex = 0;
}

updateWallpaper();
}

function prevWallpaper(){
currentIndex--;

if(currentIndex < 0){
currentIndex =
wallpapers[currentCategory].length - 1;
}

updateWallpaper();
}

function changeCategory(){
currentCategory =
document.getElementById("category").value;

currentIndex = 0;

updateWallpaper();
}

updateWallpaper();

</script>

</body>
</html>
